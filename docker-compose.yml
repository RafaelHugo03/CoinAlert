services:
  mongodb:
    image: mongo:7.0
    container_name: coinalert-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coinalert-api
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
      - MongoDB__ConnectionString=mongodb://mongodb:27017
      - MongoDB__DatabaseName=CoinAlert
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/coin-alert
      dockerfile: Dockerfile
    container_name: coinalert-frontend
    ports:
      - "3000:80"

volumes:
  mongo-data:
